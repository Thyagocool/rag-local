# =============================================================================
# Docker Compose — Stack completa: API + Ollama + ChromaDB + Nginx
# Uso: docker compose up -d
# =============================================================================

services:
  # ─── API (FastAPI + RAG + Agentes + MCP) ─────────────────────────────────
  api:
    build:
      context: backend
      dockerfile: Dockerfile
    image: rag-api:latest
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama:11434
      - RAG_CHROMA_PERSIST_DIR=/data/chroma
      - RAG_DEBUG=false
      - RAG_RERANKING_ENABLED=true
      - RAG_TRACING_ENABLED=false
    volumes:
      - chroma_data:/data/chroma
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Ollama (LLM + Embeddings) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── Init: baixa os modelos no Ollama ───────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: rag-ollama-init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Baixando modelo de linguagem...' &&
        ollama pull llama3.2:3b &&
        echo 'Baixando modelo de embeddings...' &&
        ollama pull nomic-embed-text &&
        echo 'Modelos prontos!'
      "
    restart: no

volumes:
  chroma_data:
    name: rag_chroma_data
  ollama_data:
    name: rag_ollama_data
